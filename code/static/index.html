<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRIAGE AGENT</title>
  <style>
    :root {
      --lime: #32CD32;
      --bg: #1a1a1a;
      --card: #252525;
      --text: #e0e0e0;
      --muted: #888;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1.5rem;
      min-height: 100vh;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 {
      color: var(--lime);
      font-size: 1.75rem;
      letter-spacing: 0.15em;
      margin: 0;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 0.75rem;
      background: var(--card);
      border: 1px solid #444;
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      resize: vertical;
    }
    button {
      margin-top: 0.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--lime);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .pipeline {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1rem 0;
    }
    .step {
      padding: 0.35rem 0.6rem;
      background: var(--card);
      border-radius: 4px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .step.active {
      color: var(--lime);
      border: 1px solid var(--lime);
    }
    .step.done {
      color: #8f8;
    }
    .result-box {
      background: var(--card);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      white-space: pre-wrap;
      font-size: 0.9rem;
    }
    .json-box {
      background: #111;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 0.5rem;
      overflow-x: auto;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
    }
    .error {
      color: #f88;
    }
    .nav-links { margin-bottom: 1rem; }
    .nav-links a { color: var(--lime); margin-right: 1rem; }
    .table-wrap { overflow-x: auto; margin-top: 1.5rem; max-width: 100%; }
    table.submissions {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 8px;
      overflow: hidden;
    }
    table.submissions th, table.submissions td {
      padding: 0.6rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    table.submissions th {
      background: #1f1f1f;
      color: var(--lime);
      font-weight: 600;
    }
    table.submissions tr:hover { background: #2a2a2a; }
    table.submissions .text-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pagination { margin-top: 1rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .pagination button {
      padding: 0.4rem 0.6rem;
      background: var(--card);
      color: var(--text);
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
    }
    .pagination button:hover:not(:disabled) { border-color: var(--lime); color: var(--lime); }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    .pagination span { color: var(--muted); font-size: 0.9rem; }
    #listSection { display: none; }
    #listSection.visible { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>TRIAGE AGENT</h1>
    <div class="nav-links">
      <a href="#" id="linkSubmit">Submit</a>
      <a href="#" id="linkList">View submissions</a>
    </div>
  </header>
  <div id="submitSection" class="container">
    <textarea id="input" placeholder="Paste or type text to triage…"></textarea>
    <button id="submit">Submit</button>
    <div class="pipeline" id="pipeline"></div>
    <div class="result-box" id="result" style="display:none;"></div>
    <div class="json-box" id="json" style="display:none;"></div>
    <div class="error" id="error" style="display:none;"></div>
  </div>
  <div id="listSection" class="container">
    <h2 style="color: var(--lime); font-size: 1.1rem;">Submissions (newest first)</h2>
    <div class="table-wrap">
      <table class="submissions" id="submissionsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Text</th>
            <th>Classification</th>
            <th>Actionability</th>
            <th>Routing</th>
            <th>Summary</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="submissionsBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
    <div class="error" id="listError" style="display:none;"></div>
  </div>
  <script>
    const steps = ['Validating…', 'Idempotency', 'Empty check', 'Dedup', 'LLM', 'Routing', 'Done'];
    const pipelineEl = document.getElementById('pipeline');
    const resultEl = document.getElementById('result');
    const jsonEl = document.getElementById('json');
    const errorEl = document.getElementById('error');
    let currentListPage = 1;
    const perPage = 10;

    function showSection(id) {
      document.getElementById('submitSection').style.display = id === 'submitSection' ? 'block' : 'none';
      document.getElementById('listSection').classList.toggle('visible', id === 'listSection');
      if (id === 'listSection') loadList(1);
    }
    document.getElementById('linkSubmit').onclick = (e) => { e.preventDefault(); showSection('submitSection'); };
    document.getElementById('linkList').onclick = (e) => { e.preventDefault(); showSection('listSection'); };

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString();
    }
    async function loadList(page) {
      currentListPage = page;
      const body = document.getElementById('submissionsBody');
      const paginationEl = document.getElementById('pagination');
      const listError = document.getElementById('listError');
      listError.style.display = 'none';
      body.innerHTML = '<tr><td colspan="7">Loading…</td></tr>';
      try {
        const r = await fetch('/submissions/list?page=' + page + '&per_page=' + perPage);
        const data = await r.json();
        if (!r.ok) {
          listError.textContent = data.detail || r.statusText;
          listError.style.display = 'block';
          body.innerHTML = '';
          return;
        }
        const items = data.items || [];
        const total = data.total || 0;
        body.innerHTML = items.length === 0
          ? '<tr><td colspan="7">No submissions yet.</td></tr>'
          : items.map(s => '<tr><td>' + s.id + '</td><td class="text-cell" title="' + escapeHtml(s.text) + '">' + escapeHtml(s.text.length > 80 ? s.text.slice(0, 80) + '…' : s.text) + '</td><td>' + escapeHtml(s.classification) + '</td><td>' + escapeHtml(s.actionability) + '</td><td>' + escapeHtml(s.routing_destination) + '</td><td class="text-cell" title="' + escapeHtml(s.summary) + '">' + escapeHtml(s.summary.length > 50 ? s.summary.slice(0, 50) + '…' : s.summary) + '</td><td>' + formatDate(s.created_at) + '</td></tr>').join('');
        const totalPages = Math.max(1, Math.ceil(total / perPage));
        paginationEl.innerHTML = '<span>Page ' + page + ' of ' + totalPages + ' (' + total + ' total)</span>' +
          (page > 1 ? '<button onclick="loadList(' + (page - 1) + ')">Previous</button>' : '') +
          (page < totalPages ? '<button onclick="loadList(' + (page + 1) + ')">Next</button>' : '');
      } catch (e) {
        listError.textContent = e.message || 'Failed to load';
        listError.style.display = 'block';
        body.innerHTML = '';
      }
    }

    function setPipeline(activeIndex) {
      pipelineEl.innerHTML = steps.map((label, i) => {
        const done = i < activeIndex;
        const active = i === activeIndex;
        let c = 'step';
        if (done) c += ' done';
        else if (active) c += ' active';
        return '<span class="' + c + '">' + label + '</span>';
      }).join('');
    }

    document.getElementById('submit').addEventListener('click', async () => {
      const text = document.getElementById('input').value.trim();
      if (!text) return;
      resultEl.style.display = 'none';
      jsonEl.style.display = 'none';
      errorEl.style.display = 'none';
      pipelineEl.innerHTML = '';
      const btn = document.getElementById('submit');
      btn.disabled = true;

      for (let i = 0; i <= steps.length; i++) {
        setPipeline(i);
        await new Promise(r => setTimeout(r, 200));
      }

      try {
        const r = await fetch('/submissions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text })
        });
        const data = await r.json();
        if (!r.ok) {
          errorEl.textContent = data.detail || r.statusText;
          errorEl.style.display = 'block';
        } else {
          const res = data.result || data;
          resultEl.textContent = [
            'Classification: ' + (res.classification || ''),
            'Actionability:  ' + (res.actionability || ''),
            'Routing:        ' + (res.routing_destination || ''),
            'Summary:        ' + (res.summary || '')
          ].join('\n');
          resultEl.style.display = 'block';
          jsonEl.textContent = JSON.stringify(data, null, 2);
          jsonEl.style.display = 'block';
        }
      } catch (e) {
        errorEl.textContent = e.message || 'Request failed';
        errorEl.style.display = 'block';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
